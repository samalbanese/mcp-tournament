name: Bug report
description: Tell us what went wrong so we can help fix it.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Tell us what you saw and what you were trying to do.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior

  - type: textarea
    id: repro-steps
    attributes:
      label: Reproduction steps
      description: List the shortest set of steps that reliably triggers the problem.

  - type: dropdown
    id: entry-point
    attributes:
      label: Entry point used
      options:
        - GUI
        - CLI
        - MCP server
        - Electron app

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11, macOS 15, Ubuntu 24.04

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Remove API keys or other secrets before pasting logs here.
      render: shell
