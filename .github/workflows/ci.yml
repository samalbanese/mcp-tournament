name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            gui/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test:unit
      - run: npm ci
        working-directory: gui
      - run: npm run build
        working-directory: gui
